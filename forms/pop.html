<!DOCTYPE html>
<html>
<head>
<title>Contact Popup</title>

<style>

body{
font-family: Arial;
margin:0;
}

/* Background website content */
.content{
padding:40px;
text-align:center;
}

/* Popup background */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
backdrop-filter: blur(5px);
display:flex;
justify-content:center;
align-items:center;
}

/* Form box */
.form-box{
background:white;
padding:20px;
width:300px;
border-radius:8px;
}

/* Input fields */
input, textarea{
width:100%;
padding:8px;
margin:8px 0;
}

/* Buttons */
button{
padding:8px 15px;
border:none;
background:blue;
color:white;
cursor:pointer;
}

.close{
background:red;
float:right;
}

</style>

</head>

<body>

<!-- Website Content -->
<div class="content">
<h1>Welcome to My Website</h1>
<p>well come to my page.</p>
</div>

<!-- Popup Contact Form -->
<div class="popup" id="popup">
<div class="form-box">

<button class="close" onclick="closePopup()">X</button>

<h3>Contact Us</h3>

<form>
<input type="text" placeholder="Name" required>
<input type="email" placeholder="Email" required>
<textarea placeholder="Message"></textarea>
<button onclick="closePopup()">Send</button>
</form>

</div>
</div>

<script>
function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
