<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Pulse Gym Membership</title
</head>
<body>
    <center>



    <div class="header">
        <h2>Join Iron Pulse</h2>
        <p>Your journey starts here</p>
    </div>

    <form id="gymForm">

                <label>Full Name</label>
                <input type="text" placeholder="Athlete Name" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" placeholder="Phone Number" required>
            </div>
        </div>

        <div class="form-group">
            <label>Choose Your Membership</label>
            <select>
                <option>Monthly Starter</option>
                <option>Yearly Pro (Best Value)</option>
                <option>VIP Personal Training</option>
            </select>
        </div>

        <div class="form-group">
            <label>Current Fitness Level</label>
            
                <input type="range" min="1" max="10" value="5">
        
        </div>

        <div class="form-group">
            <label>Goal</label>
            <textarea rows="2" placeholder="Tell us what you want to achieve..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Sign Me Up!</button>
    </form>
    </center><
</div>


</body>
</html>
