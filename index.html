<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Switcher Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
    <aside class="sidebar">
        <h2>Dashboard</h2>
        <nav>
            <div class="menu-item">🏠 Home</div>
            <div class="menu-item">🗂️ Projects</div>
            <div class="menu-item">👥 Employee</div>
            <div class="menu-item">🏬 Departments</div>
            <div class="menu-item">📈 Analytics</div>
            <div class="menu-item">📖 Resources</div>
            <div class="menu-item">🏆 Rewards</div>
            <div class="menu-item">🎯 Challenges</div>
            <div class="menu-item">🎫 Tickets</div>
            <div class="menu-item">⚙️ Settings</div>
            <div class="menu-item logout">🚪 Logout</div>
        </nav>
    </aside>

    <main class="content">
        <header>
            <div class="user-profile">Welcome back, Alex!</div>
            <div class="theme-controls">
                <button onclick="changeTheme('light')">☀️ Light</button>
                <button onclick="changeTheme('dark')">🌙 Dark</button>
                <button onclick="changeTheme('custom')">🎨 Custom</button>
            </div>
        </header>

        <section class="grid">
            <div class="card"><h3>Total Users</h3><p>1,284</p></div>
            <div class="card"><h3>Revenue</h3><p>$34,200</p></div>
            <div class="card"><h3>Active Sessions</h3><p>42</p></div>
            <div class="card"><h3>projects</h3><p>5</p></div>
            <div class="card"><h3>Open Tickets</h3><p>20</p></div>
            <div class="card"><h3>System Uptime</h3><p>99.9%</p></div>
        </section>
    </main>
</div>
    <script src="main.js"></script>
</body>
</html>
