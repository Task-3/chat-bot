```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple E-commerce</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
margin-bottom:30px;
}

.products{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.product{
background:white;
padding:20px;
border-radius:10px;
cursor:pointer;
width:180px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
transition:0.3s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:100%;
border-radius:5px;
}

.details{
margin-top:40px;
background:white;
padding:20px;
width:350px;
margin-left:auto;
margin-right:auto;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.details img{
width:200px;
margin-top:10px;
}

.price{
font-weight:bold;
color:green;
}

</style>
</head>

<body>

<h1>My E-commerce Store</h1>

<div class="products">

<div class="product" onclick="showProduct(1)">
<img src="https://via.placeholder.com/150">
<h3>Mobile Phone</h3>
<p>Click for details</p>
</div>

<div class="product" onclick="showProduct(2)">
<img src="https://via.placeholder.com/150">
<h3>Laptop</h3>
<p>Click for details</p>
</div>

<div class="product" onclick="showProduct(3)">
<img src="https://via.placeholder.com/150">
<h3>Headphones</h3>
<p>Click for details</p>
</div>

</div>


<div id="productDetails" class="details">

<h2 id="name">Product Name</h2>

<img id="image" src="https://via.placeholder.com/200">

<p id="price" class="price"></p>

<p id="description">Click a product to see details</p>

</div>


<script>

const products = {

1:{
name:"Mobile Phone",
price:"Price: $500",
image:"https://via.placeholder.com/200",
description:"This smartphone comes with 8GB RAM, 128GB storage, and a powerful battery."
},

2:{
name:"Laptop",
price:"Price: $900",
image:"https://via.placeholder.com/200",
description:"A high performance laptop suitable for programming, office work, and gaming."
},

3:{
name:"Headphones",
price:"Price: $120",
image:"https://via.placeholder.com/200",
description:"Noise cancelling headphones with crystal clear sound quality."
}

};

function showProduct(id){

document.getElementById("name").innerText = products[id].name;
document.getElementById("price").innerText = products[id].price;
document.getElementById("image").src = products[id].image;
document.getElementById("description").innerText = products[id].description;

}

</script>

</body>
</html>
```
